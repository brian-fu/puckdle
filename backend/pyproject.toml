[tool.black]
line-length = 88
target-version = ["py311"]

[tool.pytest.ini_options]
# Run from backend/ so the `app.*` import root resolves.
testpaths = ["tests"]
addopts = "--cov=app --cov-report=term-missing"

[tool.coverage.run]
source = ["app"]
omit = [
    "app/__init__.py",
    "*/tests/*",
]

[tool.coverage.report]
show_missing = true
